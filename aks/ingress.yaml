apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fabric-data-agent
  namespace: fabric-data-agent
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Streamlit WebSocket 지원
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "fabric-data-agent"
spec:
  tls:
    - hosts:
        - dataagent.mskr-datanai.net
      secretName: fabric-data-agent-tls
  rules:
    - host: dataagent.mskr-datanai.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fabric-data-agent
                port:
                  number: 80
